<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期限管理カレンダー登録ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22253a;
    --border: #2e3150;
    --accent: #4f9cf9;
    --accent2: #7c6af7;
    --success: #34c77b;
    --warning: #f5a623;
    --danger: #f26b6b;
    --text: #e8eaf0;
    --text2: #8b8fa8;
    --text3: #5a5e75;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .header-logo { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--text3); margin-left: auto; font-family: 'DM Mono', monospace; }
  .container { max-width: 860px; margin: 0 auto; padding: 28px 20px; }
  .auth-banner { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; }
  .auth-icon { font-size: 24px; }
  .auth-text { flex: 1; }
  .auth-text strong { display: block; font-size: 13px; margin-bottom: 2px; }
  .auth-text span { font-size: 12px; color: var(--text2); }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-success { background: var(--success); color: #0f1117; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); background: var(--surface); padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; position: relative; }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(79,156,249,0.06); }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .upload-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .upload-sub { font-size: 12px; color: var(--text2); }
  .upload-sub span { color: var(--accent); font-weight: 500; }
  .file-list { margin-bottom: 20px; }
  .file-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; transition: border-color 0.2s; }
  .file-item.analyzing { border-color: var(--accent); }
  .file-item.done { border-color: var(--success); }
  .file-item.error { border-color: var(--danger); }
  .file-thumb { font-size: 22px; }
  .file-info { flex: 1; }
  .file-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .file-size { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .file-status { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .status-analyzing { background: rgba(79,156,249,0.15); color: var(--accent); }
  .status-done { background: rgba(52,199,123,0.15); color: var(--success); }
  .status-error { background: rgba(242,107,107,0.15); color: var(--danger); }
  .status-waiting { background: rgba(139,143,168,0.15); color: var(--text2); }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; }
  .event-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .event-date-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; text-align: center; min-width: 56px; }
  .event-date-badge .month { font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .event-date-badge .day { font-size: 22px; font-weight: 700; line-height: 1.1; font-family: 'DM Mono', monospace; }
  .event-date-badge .dow { font-size: 10px; color: var(--text2); }
  .event-title-area { flex: 1; }
  .event-title-input { font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); background: transparent; border: none; border-bottom: 1px solid transparent; width: 100%; padding: 2px 0; transition: border-color 0.2s; outline: none; }
  .event-title-input:focus { border-bottom-color: var(--accent); }
  .event-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .event-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .field label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 4px; font-weight: 500; }
  .field input, .field select, .field textarea { font-family: 'Noto Sans JP', sans-serif; font-size: 13px; color: var(--text); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; width: 100%; outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 60px; }
  .field.full { grid-column: 1 / -1; }
  .event-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding-top: 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .cal-targets { display: flex; gap: 8px; flex-wrap: wrap; }
  .cal-checkbox { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; color: var(--text2); user-select: none; }
  .cal-checkbox input { accent-color: var(--accent); width: 14px; height: 14px; }
  .event-actions { display: flex; gap: 8px; align-items: center; }
  .pdf-preview-link { font-size: 11px; color: var(--accent); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .bulk-bar { background: var(--surface); border: 1px solid var(--accent); border-radius: var(--radius); padding: 14px 20px; display: flex; align-items: center; gap: 14px; margin-top: 20px; }
  .bulk-bar-text { flex: 1; font-size: 13px; }
  .bulk-bar-text strong { color: var(--accent); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-state .icon { font-size: 36px; display: block; margin-bottom: 10px; }
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; animation: slideIn 0.2s ease; max-width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; }
  .modal-bg.open { display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; max-width: 420px; width: calc(100% - 40px); }
  .modal h2 { font-size: 17px; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.8; }
  .google-btn { background: #fff; color: #1f1f1f; border: none; border-radius: 6px; padding: 10px 16px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }
  @media (max-width: 600px) { .event-fields { grid-template-columns: 1fr; } .header-sub { display: none; } }
</style>
</head>
<body>
<header class="header">
  <div class="header-logo">📋</div>
  <div class="header-title">期限管理カレンダー登録ツール</div>
  <div class="header-sub" id="auth-indicator">未ログイン</div>
</header>
<div class="container">
  <div class="auth-banner" id="auth-banner">
    <div class="auth-icon">🔐</div>
    <div class="auth-text">
      <strong>Google カレンダーと連携してください</strong>
      <span>勉強会・締め切り・期限をカレンダーに登録するために必要です</span>
    </div>
    <button class="btn btn-primary" onclick="openOAuthModal()">Google で連携</button>
  </div>
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept=".pdf,image/*" multiple onchange="handleFiles(this.files)">
    <span class="upload-icon">📄</span>
    <div class="upload-title">PDFまたは写真をドロップ</div>
    <div class="upload-sub">MRパンフレット・医師会案内・締め切り書類など<span>なんでも対応</span></div>
    <div class="upload-sub" style="margin-top:6px">PDF・写真両対応　｜　複数ファイル同時対応</div>
  </div>
  <div class="file-list" id="file-list"></div>
  <div id="results-section" style="display:none">
    <div class="section-title">抽出された日程・期限情報</div>
    <div id="event-cards"></div>
    <div class="bulk-bar" id="bulk-bar" style="display:none">
      <div class="bulk-bar-text"><strong id="bulk-count">0件</strong> 抽出済み</div>
      <button class="btn btn-success" onclick="registerAll()">すべてカレンダーに登録</button>
    </div>
  </div>
  <div class="empty-state" id="empty-hint">
    <span class="icon">📅</span>
    <p>PDFや写真をアップロードすると<br>日時・締め切り・期限を自動で読み取り<br>カレンダーに登録します</p>
  </div>
</div>
<div class="modal-bg" id="oauth-modal">
  <div class="modal">
    <h2>🔑 Google カレンダー連携</h2>
    <p>カレンダーへの登録のため、Googleアカウントとの連携が必要です。</p>
    <button class="google-btn" onclick="startOAuth()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google アカウントで連携する
    </button>
    <div style="margin-top:12px;text-align:center">
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">後で設定する</button>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script>
let GOOGLE_CLIENT_ID = '318848654906-s0m3dalbnfj2v8f6mlguj1mmgn6joumf.apps.googleusercontent.com';
let authState = { connected: false, email: '', accessToken: '', clinicCalendarId: 'primary' };
let extractedEvents = [];
let tokenClient = null;

(async () => {
  try {
    const r = await fetch('/api/analyze', { method: 'OPTIONS' });
  } catch(e) {}
})();

const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

function handleFiles(files) {
  if (!files.length) return;
  document.getElementById('empty-hint').style.display = 'none';
  Array.from(files).forEach(f => processFile(f));
}

function processFile(file) {
  const id = 'f' + Date.now() + Math.random().toString(36).slice(2);
  addFileItem(file, id);
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const mediaType = file.type || 'application/pdf';
    setFileStatus(id, 'analyzing');
    try {
      const event = await analyzeViaBackend(base64, mediaType, file.name);
      setFileStatus(id, 'done');
      addEventCard(event, file, base64, mediaType);
    } catch(err) {
      setFileStatus(id, 'error', err.message);
    }
  };
  reader.readAsDataURL(file);
}

function addFileItem(file, id) {
  const list = document.getElementById('file-list');
  const size = file.size < 1024*1024 ? (file.size/1024).toFixed(0)+'KB' : (file.size/1024/1024).toFixed(1)+'MB';
  const icon = file.type.startsWith('image/') ? '🖼️' : '📄';
  const div = document.createElement('div');
  div.className = 'file-item'; div.id = id;
  div.innerHTML = `<div class="file-thumb">${icon}</div><div class="file-info"><div class="file-name">${esc(file.name)}</div><div class="file-size">${size}</div></div><span class="file-status status-waiting" id="status-${id}">待機中</span>`;
  list.appendChild(div);
}

function setFileStatus(id, status, msg='') {
  const el = document.getElementById('status-' + id);
  const card = document.getElementById(id);
  const map = { analyzing:['status-analyzing','<span class="spinner"></span>解析中…'], done:['status-done','✓ 完了'], error:['status-error','⚠ '+(msg||'エラー')], waiting:['status-waiting','待機中'] };
  const [cls, label] = map[status] || map.waiting;
  el.className = 'file-status ' + cls; el.innerHTML = label;
  card.className = 'file-item ' + (status !== 'waiting' ? status : '');
}

async function analyzeViaBackend(base64Data, mediaType, filename) {
  const resp = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ base64Data, mediaType, filename }),
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || 'APIエラー');
  return { ...data.event, id: 'evt' + Date.now() + Math.random().toString(36).slice(2) };
}

function addEventCard(ev, file, base64, mediaType) {
  extractedEvents.push({ ...ev, base64, mediaType });
  document.getElementById('results-section').style.display = 'block';
  const cards = document.getElementById('event-cards');
  const [year, month, day] = (ev.date || '--').split('-');
  const dow = ev.date ? ['日','月','火','水','木','金','土'][new Date(ev.date).getDay()] : '';
  const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const div = document.createElement('div');
  div.className = 'event-card'; div.id = 'card-' + ev.id;
  div.innerHTML = `
    <div class="event-header">
      <div class="event-date-badge">
        <div class="month">${monthNames[parseInt(month)]||'—'}</div>
        <div class="day">${day||'?'}</div>
        <div class="dow">${dow ? dow+'曜' : ''}</div>
      </div>
      <div class="event-title-area">
        <input class="event-title-input" id="title-${ev.id}" value="${esc(ev.title||'')}" placeholder="タイトル">
        <div class="event-subtitle">${esc(ev.organizer||'')}${ev.speaker?' ／ 講師：'+ev.speaker:''}</div>
      </div>
    </div>
    <div class="event-fields">
      <div class="field"><label>日付</label><input type="date" id="date-${ev.id}" value="${ev.date||''}"></div>
      <div class="field"><label>開始時刻</label><input type="time" id="start-${ev.id}" value="${ev.start_time||''}"></div>
      <div class="field"><label>終了時刻</label><input type="time" id="end-${ev.id}" value="${ev.end_time||''}"></div>
      <div class="field"><label>場所</label><input type="text" id="loc-${ev.id}" value="${esc(ev.location||'')}" placeholder="会場・場所"></div>
      <div class="field full"><label>メモ</label><textarea id="notes-${ev.id}">${esc(ev.notes||'')}</textarea></div>
    </div>
    <div class="event-footer">
      <div class="cal-targets">
        <label class="cal-checkbox"><input type="checkbox" id="cal-p-${ev.id}" checked><span>👤 個人</span></label>
        <label class="cal-checkbox"><input type="checkbox" id="cal-c-${ev.id}" checked><span>🏥 クリニック</span></label>
      </div>
      <div class="event-actions">
        <a class="pdf-preview-link" href="#" onclick="togglePreview(event,'${ev.id}')">📎 原本確認</a>
        <button class="btn btn-primary btn-sm" id="reg-${ev.id}" onclick="registerSingle('${ev.id}')">カレンダーに登録</button>
      </div>
    </div>
    <div id="preview-${ev.id}" style="display:none;margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
      <p style="font-size:11px;color:var(--text2);margin-bottom:8px">原本</p>
    </div>`;
  cards.appendChild(div);
  updateBulkBar();
}

function updateBulkBar() {
  const n = document.getElementById('event-cards').children.length;
  if (n > 0) { document.getElementById('bulk-bar').style.display = 'flex'; document.getElementById('bulk-count').textContent = n + '件'; }
}

function togglePreview(e, evId) {
  e.preventDefault();
  const area = document.getElementById('preview-' + evId);
  if (area.style.display === 'none') {
    const evObj = extractedEvents.find(x => x.id === evId);
    if (evObj) {
      const src = `data:${evObj.mediaType};base64,${evObj.base64}`;
      if (evObj.mediaType.startsWith('image/')) {
        area.innerHTML += `<img src="${src}" style="max-width:100%;border-radius:6px">`;
      } else {
        area.innerHTML += `<iframe src="${src}" style="width:100%;height:420px;border:none;border-radius:6px;background:#fff"></iframe>`;
      }
    }
    area.style.display = 'block';
  } else { area.style.display = 'none'; }
}

async function registerSingle(evId) {
  if (!authState.connected) { openOAuthModal(); return; }
  const btn = document.getElementById('reg-' + evId);
  btn.disabled = true; btn.textContent = '登録中…';
  const title = document.getElementById('title-' + evId).value;
  const date = document.getElementById('date-' + evId).value;
  const start = document.getElementById('start-' + evId).value;
  const end = document.getElementById('end-' + evId).value;
  const loc = document.getElementById('loc-' + evId).value;
  const notes = document.getElementById('notes-' + evId).value;
  const useP = document.getElementById('cal-p-' + evId).checked;
  const useC = document.getElementById('cal-c-' + evId).checked;
  const evObj = extractedEvents.find(x => x.id === evId);
  if (!date || !start) { showToast('日付・開始時刻を入力してください', 'error'); btn.disabled = false; btn.textContent = 'カレンダーに登録'; return; }
  const targets = [];
  if (useP) targets.push('primary');
  if (useC && authState.clinicCalendarId) targets.push(authState.clinicCalendarId);
  let ok = true;
  for (const calId of targets) {
    try { await postCalendarEvent({ calId, title, date, start, end, loc, notes, filename: evObj?.filename || '' }); }
    catch(e) { showToast('登録失敗: ' + e.message, 'error'); ok = false; }
  }
  if (ok) { showToast('✓ カレンダーに登録しました', 'success'); btn.textContent = '✓ 登録済み'; btn.style.background = 'var(--success)'; btn.style.color = '#0f1117'; }
  else { btn.disabled = false; btn.textContent = 'カレンダーに登録'; }
}

async function postCalendarEvent({ calId, title, date, start, end, loc, notes, filename }) {
  const startDt = `${date}T${start}:00+09:00`;
  const endDt = end ? `${date}T${end}:00+09:00` : `${date}T${start}:00+09:00`;
  const body = { summary: title, location: loc, description: notes + (filename ? `\n\n[原本: ${filename}]` : ''), start: { dateTime: startDt, timeZone: 'Asia/Tokyo' }, end: { dateTime: endDt, timeZone: 'Asia/Tokyo' } };
  const resp = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + authState.accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!resp.ok) { const err = await resp.json().catch(()=>({})); throw new Error(err.error?.message || 'Calendar APIエラー'); }
}

async function registerAll() {
  const cards = document.querySelectorAll('.event-card');
  for (const card of cards) {
    const evId = card.id.replace('card-', '');
    const btn = document.getElementById('reg-' + evId);
    if (btn && !btn.disabled) { await registerSingle(evId); await new Promise(r => setTimeout(r, 500)); }
  }
}

function openOAuthModal() { document.getElementById('oauth-modal').classList.add('open'); }
function closeModal() { document.getElementById('oauth-modal').classList.remove('open'); }

function startOAuth() {
  if (!GOOGLE_CLIENT_ID) { showToast('Google Client IDが設定されていません', 'error'); return; }
  if (typeof google === 'undefined' || !google.accounts || !google.accounts.oauth2) {
    showToast('Googleのライブラリを読み込み中です。数秒後にもう一度お試しください', 'error'); return;
  }
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/userinfo.email',
      callback: (resp) => {
        if (resp.error || !resp.access_token) { showToast('連携できませんでした: ' + (resp.error || 'トークンを取得できません'), 'error'); return; }
        authState.accessToken = resp.access_token;
        authState.connected = true;
        fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + resp.access_token } })
          .then(r => r.json()).then(info => { authState.email = info.email || 'Googleアカウント'; onAuthSuccess(authState.email); fetchClinicCalendars(resp.access_token); })
          .catch(() => onAuthSuccess('Googleアカウント'));
      },
    });
  }
  tokenClient.requestAccessToken();
}

async function fetchClinicCalendars(token) {
  try {
    const resp = await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList', { headers: { Authorization: 'Bearer ' + token } });
    const data = await resp.json();
    const calendars = (data.items || []).filter(c => c.accessRole === 'owner');
    if (calendars.length > 1) showCalendarPicker(calendars);
  } catch(e) {}
}

function showCalendarPicker(calendars) {
  const banner = document.getElementById('auth-banner');
  const select = `<select id="clinic-cal-select" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;margin-top:8px">${calendars.map(c => `<option value="${c.id}">${c.summary}</option>`).join('')}</select>`;
  banner.innerHTML += `<div style="font-size:12px;color:var(--text2);margin-top:8px">クリニック用カレンダーを選択：${select}<button class="btn btn-secondary btn-sm" style="margin-left:8px" onclick="setClinicCal()">設定</button></div>`;
}

function setClinicCal() {
  const sel = document.getElementById('clinic-cal-select');
  if (sel) { authState.clinicCalendarId = sel.value; showToast('クリニック用カレンダーを設定しました', 'success'); }
}

function onAuthSuccess(email) {
  closeModal();
  document.getElementById('auth-banner').innerHTML = `<div class="auth-icon">✅</div><div class="auth-text"><strong>Google カレンダー 連携済み</strong><span>${email}</span></div><button class="btn btn-secondary btn-sm" onclick="openOAuthModal()">変更</button>`;
  document.getElementById('auth-indicator').textContent = email;
  showToast('✓ Googleカレンダーと連携しました', 'success');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg; c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
</script>
</body>
</html>
